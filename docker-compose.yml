services:
  api-host:
    build:
      context: .
      dockerfile: apps/api-host/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - generated-audio:/app/generated/audio
      - generated-documents:/app/generated/documents
    healthcheck:
      test:
        [
          "CMD",
          "uv",
          "run",
          "--no-sync",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  web-angular:
    build:
      context: .
      dockerfile: apps/web-angular/Dockerfile
    command:
      [
        "corepack",
        "pnpm",
        "--config.verify-deps-before-run=false",
        "--dir",
        "apps/web-angular",
        "run",
        "start:docker",
      ]
    depends_on:
      api-host:
        condition: service_healthy
    ports:
      - "4200:4200"

volumes:
  generated-audio:
  generated-documents:
